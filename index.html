<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monitor Industrial - Visualización Completa</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #bdc3c7 0%, #eff2f3 25%, #95a5a6 50%, #eff2f3 75%, #bdc3c7 100%) fixed;
            font-family: Arial, sans-serif; margin:0; padding:20px;
        }
        .tabs { 
            display:flex; 
            cursor:pointer; 
            gap:2px; 
            margin-bottom:10px; 
        }
        .tab { 
            padding:10px 20px; 
            border:2px solid #000; 
            background:#f1f1f1; 
            border-radius:5px 5px 0 0; 
        }
        .tab.active { 
            background:#fff; 
            font-weight:bold; 
            border-bottom:none; 
        }
                
        .tab-content {
            display:none; 
            border:1px solid #ccc; 
            padding:10px; 
            background:#00C3C3; 
            min-height:800px; 
        }
        .tab-content.active { 
            display:block; 
        }
        .tab.redalarm {
            background-color: red;
            animation: parpadeo 2s infinite;
            color: white;
        }
        .tab.offline {
            background-color: orange;
            animation: parpadeo 2s infinite;
            color: black;
        }
        
        .tab.diesel-low {
            background-color: yellow;
            animation: parpadeo 2s infinite;
            color: black;
        }
        .alarms-house-layout { 
            display: flex; 
            justify-content: flex-start; 
            align-items: flex-start;	
            gap: 120px; margin: 0; width: 100%;
            
        }
        .alarms-container { 
            width:280px; 
            flex-shrink:0; 
            
        }
        .alarm { 
            border:1px solid #ccc; 
            border-radius:5px; 
            padding:10px; 
            margin:10px 0; 
            font-size:12px; 
            
        }
        .alarm.active { 
            background:#ffe5e5; 
            color:#b30000; 
            font-weight:bold; 
            
        }
        .alarm.inactive { 
            background:#e5ffe5; 
            color:#007000; 
            
        }
        .status-indicator { 
            padding:10px; 
            text-align:center; 
            font-weight:bold; 
            border-radius:5px; 
            margin-bottom:10px; 
            background:#ffc107; 
            
        }
        /* ====== Área de la casa ====== */
        .house-area { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin-top: 20px; flex: 0 0 auto;
            
        }
        .house-drawing { 
            position: relative; 
            width: 540px; 
            height: 620px; 
            top: -70px; 
            left: -50px; 
            
        }
        .roof { 
            position: absolute; 
            top: -60px; left: 0; 
            width: 0; height: 0; 
            border-left: 270px solid transparent; 
            border-right: 270px solid transparent; 
            border-bottom: 200px solid transparent; 
            
        }
        .roof::before, .roof::after { 
            content: ""; 
            position: absolute; 
            top: 0; width: 2px; 
            height: 320px; 
            background-color: #000;
            
        }
        .roof::before { 
            left: -270px; 
            transform: rotate(57deg); 
            transform-origin: bottom right;
            
        }
        .roof::after { 
            right: -270px; 
            transform: rotate(-57deg);
            transform-origin: bottom left;
            
        }
        .roof .base-line { 
            position: absolute; 
            bottom: 0; 
            left: -270px; 
            width: 540px; 
            height: 2px; 
            background-color: #000;
            
        }
        .walls { 
            position: absolute; 
            bottom: 0; 
            width: 540px; 
            height: 360px; 
            background-color: transparent; 
            border: 2px solid #000000; 
            box-sizing: border-box; 
            
        }
        .sala-baterias { 
            position:absolute; 
            bottom:0; 
            left:0; 
            width:180px; 
            height:220px; 
            border:2px solid #000; 
            text-align:center; 
            font-weight:bold; 
            font-size:12px; 
            
        }
        .planta-CD { 
            position: absolute; 
            bottom: 0; 
            left: 360px; 
            width: 180px; 
            height: 220px; 
            background-color: transparent; 
            border: 2px solid #000000; 
            box-sizing: border-box; 
            text-align:center; 
            font-weight:bold; 
            font-size:12px; 
            
        }
        .bateria{
        	position: absolute;
          	bottom: 0%;	/* Posicionamiento a 0% de la parte inferior */
          	left: 0%;		/* Posicionamiento a 0% de la izquierda */
    		transform: translate(40px, 50px); /* Ajuste fino para mantener el diseño original (45px left, -50px bottom = 50px up) */
        }
        .persona{
    		position: absolute;
          	bottom: 0%;
          	left: 0%;
          	transform: translate(25px, -15px); /* Ajuste fino */
        }
        .termometro{
    		position: absolute;
          	top: 40%; /* ~220px desde abajo (620px * 0.35 = 217) */
          	left: 46%; /* ~250px desde la izquierda */
    		transform: scale(.75);
        }
        .barra-tierra{
    		position: absolute;
          	top: 47%; 
          	right: 0%; 
    		transform: translateX(25px) scale(0.70);
        }
        .rectificador{
    		position: absolute;
          	bottom: 2%; 
          	right: 2%;
          	transform: scale(0.8); /* translateX(-5px); Ajuste fino */
        }
        .breaker{
    		position: absolute;
          	top: 70%; /* ~120px desde abajo (620 - 120 = 500; 500/620 ~ 80%) */
          	right: 0%; /* ~395px desde la izquierda (540-395=145; 145/540 ~ 27%) */
          	transform: translateX(-50px) scale(1.2); /* Ajuste fino */
        }
    
    	/* === Contenedor de figuras EXTERNAS === */
    
    	.external-figures {
    		position: relative;
      	  	width: 100%;
      	  	height: 150px;           /* Reducido para mejor visualización */
    	  	margin-top: 20px;
    	}
    	/* === Figuras FUERA de la casa (posicionadas por % en relación a .external-figures) === */  
      	.tank-area {
    		position: absolute;
      	  	bottom: 70%; /* Centro vertical */
      	  	left: 0%;
    		transform: translateX(-100px) scale(0.8);
    	}

    	.diesel-tank {
        	position: absolute;
          	width: 155px;
          	height: 75px;
          	border: 4px solid #555;
          	border-radius: 60px;
          	background: radial-gradient(circle at 50% 30%, #fff176 0%, #FAD201 60%, #c9a801 100%);
          	box-shadow: inset -6px 0 10px rgba(0,0,0,0.3), inset 6px 0 10px rgba(255,255,255,0.5);
          	overflow: hidden;
          	position: relative;
    	}
    
        .diesel-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, #007b00, #00ff00);
            border-radius: 0 0 40px 40px;
            transition: height 0.8s ease, background 0.6s ease;
            box-shadow: inset 0 2px 5px rgba(255, 255, 255, 0.5);
        }
    
        .diesel-text {
            position: absolute;
            width: 100%;
            text-align: center;
            bottom: 10px;
            font-weight: bold;
            color: #000;
            font-size: 20px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.9);
        }
    
    	.diesel-title {
        	position: absolute;
        	top: -20px; /* justo encima del tanque */
        	left: 45%;
        	width: 100%;      /* Ocupa todo el ancho del cuadro padre */
          	transform: translateX(-20%);
        	font-size: 14px;
        	font-weight: bold;
        	color: #333;
        	text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        	pointer-events: none;
    	}
    
        .generador{
    		position: absolute;
          	bottom: 40%; 
          	left: 13%;
    		transform: scale(0.8);
        }
        /* Solo líneas, sin relleno */
        .gen-body, .gen-base {
            fill: none;
            stroke: black;
            stroke-width: 2;
        }
        .button {
            margin: 10px;
            padding: 8px 12px;
            cursor: pointer;
        }
        .ats{
    		position: absolute;
          	bottom: 45%;
          	right: 20%;
    		transform: scale(0.8);
        }
        .flecha1{
    		position: absolute;
          	bottom: 70%;
          	left: 35%;
    		transform: scale(0.4);
        }
          .flecha2{
    		position: absolute;
          	bottom: 70%;
          	right: 5%;
    		transform: translateX(10px) scale(0.4);
        }
          .flecha3{
    		position: absolute;
          	bottom: 80%;
          	right: 10%;
          	transform: translateY(-5px) scale(0.4) rotate(-90deg); /* Se gira para apuntar arriba */
        }
        .flecha4{
    		position: absolute;
          	bottom: 67%;
          	left: 1%;
    		transform: scale(0.35);
        }
        .poste{
    		position: absolute;
          	bottom: 35%;
          	right: 0%;
    		transform: traslateX(25%);
        } 
        
        .alarm-figure-active {
            animation: parpadeo 2s infinite;
        }
    
        .alarm-figure-active svg * { 
            stroke:red !important; 
            fill:red !important; 
            
        }
        @keyframes parpadeo { 0% { opacity:1; } 50% { opacity:0.4; } 100% { opacity:1; } 
            
        }
        .hidden { display:none !important; }
    
        .history-table {
            width: auto;
            border-collapse: collapse;
            margin-top: 8px;
            background: #fff;
            color: #000;
            font-size: 12px;
        }
        
        .history-table th,
        .history-table td {
            border: 1px solid #ccc;
            padding: 3px 50px;
            text-align: left; /* o center si prefieres */
        }
    
        .history-table th {
            background-color: #00C3C3;
            color: #fff;
        }
        .export-btn {
            margin-bottom: 5px;
            padding: 4px 10px;
            background-color: #00A0A0;
            color: #fff;
            border: none;
            cursor: pointer;
            border-radius: 3px;
        }
        .export-btn:hover {
            background-color: #008080;
        }
        
        h2 {
            text-align: center;
        }
    
    </style>
</head>

/* ---------------- MOTOR DASHBOARD ---------------- */
function initDashboard() { 
    const tabsBox = document.getElementById('tabs-container');
    const contentsBox = document.getElementById('contents-container');

    tabsBox.innerHTML = '';
    contentsBox.innerHTML = '';

    Object.keys(CONFIG_SITIOS).forEach((id, index) => {
        const cfg = CONFIG_SITIOS[id];

        // Inicializar estado del sitio
        siteState[id] = {
            online: false,
            hasAlarm: false,
            lastVal: null,
            dieselLevel: cfg.tieneDiesel ? 100 : null, // asumir 100% inicial
            log: [],
            historyIds: new Set(),
            historyBuffer: []
        };

        // ===== Crear TAB =====
        const tabDiv = document.createElement('div');
        tabDiv.className = `tab ${index === 0 ? 'active' : ''}`;
        tabDiv.id = `t-${id}`;
        tabDiv.textContent = cfg.nombre;
        tabDiv.onclick = () => showTab(id);
        tabsBox.appendChild(tabDiv);

        // ===== Crear CONTENIDO =====
        const contentDiv = document.createElement('div');
        contentDiv.className = `tab-content ${index === 0 ? 'active' : ''}`;
        contentDiv.id = `c-${id}`;
        contentDiv.innerHTML = `
            <div id="status-${id}" class="status-indicator">ESPERANDO DATOS...</div>
            <div class="alarms-house-layout">
                <div class="alarms-container" id="list-${id}"></div>
                ${getHouseHTML(id, cfg.tieneDiesel)}
            </div>
            <div class="history-section">
                <h3 class="history-title">📜 Historial ${cfg.nombre}</h3>
                <button class="export-btn" onclick="exportHistoryToExcel('${id}')">Exportar a Excel</button>
                <table id="history-${id}" class="history-table">
                    <thead>
                        <tr>
                            <th>Fecha / Hora</th>
                            <th>Nombre</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        `;
        contentsBox.appendChild(contentDiv);

        // ===== Inicializar visualización de estado =====
        refreshStatusHeader(id);

        // ===== Historial =====
        const historyBox = document.querySelector(`#history-${id} tbody`);
        historyBox.innerHTML = '';

        const historyRef = db.ref(`history/${id}`);
        historyRef.off();

        historyRef.limitToLast(50).on('child_added', snapshot => {
            const key = snapshot.key;
            if (siteState[id].historyIds.has(key)) return;
            siteState[id].historyIds.add(key);

            const data = snapshot.val();
            if (!data) return;

            siteState[id].historyBuffer.push(data);
            if (siteState[id].historyBuffer.length > 50) siteState[id].historyBuffer.shift();

            // Renderizar buffer en la tabla
            renderHistoryTable(id);
        });
    });
}

/* ----------------- MQTT ----------------- */
const client = mqtt.connect('wss://d4e6f442.ala.us-east-1.emqxsl.com:8084/mqtt',{
    clientId:'web_'+Math.random().toString(16).substr(2,5),
    username:'Olivas', password:'Jangel27'
});

client.on('connect',()=>{
    Object.values(CONFIG_SITIOS).forEach(s=>{
        client.subscribe([s.topicos.alarmas, s.topicos.status,s.topicos.history]);
        if(s.topicos.diesel) client.subscribe(s.topicos.diesel);
    });
});

client.on('message',(topic,message)=>{
    const id = Object.keys(CONFIG_SITIOS).find(k=>Object.values(CONFIG_SITIOS[k].topicos).includes(topic));
    if(!id) return;

    if(topic===CONFIG_SITIOS[id].topicos.status){
        siteState[id].online = message.toString()==='ONLINE';
    } else if(topic===CONFIG_SITIOS[id].topicos.alarmas){
        const val = (message[0]<<8)|message[1];
        updateUI(id,val);

	} else if(topic===CONFIG_SITIOS[id].topicos.history){

    if(IS_MASTER){

        const data = JSON.parse(message.toString());

        // data = { i:0-15, s:0/1, t:epoch }

        const alarmName = CONFIG_SITIOS[id].alarmNames[data.i];
        const estado = data.s === 1 ? "🚨 ACTIVADA" : "✅ CESÓ";

        // Usamos el timestamp real del ESP32
        db.ref(`history/${id}`).push({
            time: data.t * 1000,   // convertir epoch a milisegundos
            name: alarmName,
            state: estado
        	});
    	}	
    } else if(topic===CONFIG_SITIOS[id].topicos.diesel){
        const porc = parseInt(message.toString());
        siteState[id].dieselLevel = porc; // <-- actualizar siempre
        const fill = document.getElementById(`fill-${id}`);
        const txt = document.getElementById(`text-${id}`);
        if(fill){ fill.style.height = porc+'%'; fill.style.background=porc<20?'red':porc<40?'darkorange':'green'; txt.innerText = porc+'%'; }
    }       
    refreshStatusHeader(id);
});

/* ----------------- ACTUALIZAR UI ----------------- */

function updateUI(id, val){
    const list = document.getElementById(`list-${id}`);
    const names = CONFIG_SITIOS[id].alarmNames;
    let alarmed = false; 
    list.innerHTML = '';

    // Resetear figuras
    document.querySelectorAll(`#c-${id} [data-figura]`)
        .forEach(fig => fig.classList.remove('alarm-figure-active'));

    for(let i=0; i<names.length; i++){
        const active = (val >> i) & 1;
        const alarmName = names[i];
        if(active) alarmed = true;

        // Mostrar lista de alarmas
        list.innerHTML += `
            <div class="alarm ${active?'active':'inactive'}">
                ${alarmName}: ${active?'?? Activa' : '? Sin alarma'}
            </div>`;

        // Activar figura asociada
        if(active && MAP_ALARMA_FIGURA[alarmName]){
            const figuraNombre = MAP_ALARMA_FIGURA[alarmName];
            const figura = document.querySelector(`#c-${id} [data-figura="${figuraNombre}"]`);
            if(figura) figura.classList.add('alarm-figure-active');
        }

        // Guardar histórico si cambió el estado
        //if(siteState[id].lastVal !== null &&
        //   active !== ((siteState[id].lastVal >> i) & 1)){
        //    addHistory(id, alarmName, active ? "🚨 ACTIVADA" : "✅ CESÓ");
        //}
    }

    siteState[id].hasAlarm = alarmed;
    siteState[id].lastVal = val;

    // Actualizar pestaña y status (alarma, diesel bajo, offline, online)
    refreshStatusHeader(id);
}

function exportHistoryToExcel(id) {
    const table = document.getElementById(`history-${id}`);
    const rows = table.querySelectorAll("tr");

    let csv = [];

    rows.forEach(row => {
        let cols = row.querySelectorAll("th, td");
        let rowData = [];
        cols.forEach(col => {
            rowData.push('"' + col.innerText.replace(/"/g, '""') + '"');
        });
        csv.push(rowData.join(","));
    });

    // 👇 AGREGAR BOM UTF-8 (CLAVE)
    const csvContent = "\uFEFF" + csv.join("\n");

    const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
    const link = document.createElement("a");

    link.href = URL.createObjectURL(blob);
    link.download = `Historial_${id}.csv`;
    link.click();
}

function renderHistoryTable(id) {
    const tbody = document.querySelector(`#history-${id} tbody`);
    if (!tbody) return;

    tbody.innerHTML = ''; // limpiar tabla

    siteState[id].historyBuffer
        .slice().reverse() // mostrar más reciente arriba
        .forEach(d => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${new Date(d.time).toLocaleString()}</td>
                <td>${d.name}</td>
                <td>${d.state}</td>
            `;
            tbody.appendChild(row);
        });
}

/* ----------------- CSV ----------------- */
function downloadCSV(id){
    let csv = "Fecha,Alarma,Estado\n";
    siteState[id].log.forEach(r=>csv+=`${r.time},${r.name},${r.state}\n`);
    const blob = new Blob([csv],{type:'text/csv'});
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a'); a.setAttribute('href',url); a.setAttribute('download',`Log_${id}.csv`); a.click();
}

/* ----------------- STATUS ----------------- */
function refreshStatusHeader(id) {
    const statusEl = document.getElementById(`status-${id}`);
    const tabEl = document.getElementById(`t-${id}`);
    const s = siteState[id];
    const cfg = CONFIG_SITIOS[id];

    // Limpiar clases de parpadeo
    tabEl.classList.remove('redalarm', 'offline', 'diesel-low');

    // Mantener nombre de la pestaña intacto
    tabEl.textContent = cfg.nombre;

    // Determinar prioridad: OFFLINE > ALARMA > DIESEL BAJO > ONLINE
    if (!s.online) {
        statusEl.innerText = `⚠️ OFFLINE ${cfg.nombre}`;
        statusEl.style.background = 'orange';
        tabEl.classList.add('offline'); // naranja parpadeante
    } else if (s.hasAlarm) {
        statusEl.innerText = 'ALARMA ACTIVA';
        statusEl.style.background = 'red';
        tabEl.classList.add('redalarm'); // rojo parpadeante
    } else if (cfg.tieneDiesel && s.dieselLevel < 25) {
        statusEl.innerText = `⛽ DIESEL BAJO ${cfg.nombre}`;
        statusEl.style.background = 'yellow';
        tabEl.classList.add('diesel-low'); // amarillo parpadeante
    } else {
        statusEl.innerText = 'SISTEMA ONLINE';
        statusEl.style.background = '#28a745';
    }
}

function showTab(id){
    document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.id===`t-${id}`));
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.toggle('active',c.id===`c-${id}`));
}
